services:
  postgres:
    image: postgres:16-alpine
    container_name: training-websockets-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: training_websockets
    # Port na hoście ≠ 5432, żeby nie trafiać w lokalnego Postgresa.
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d training_websockets"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
